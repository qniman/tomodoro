; Supervisor configuration for Tomodoro
; Copy to /etc/supervisor/conf.d/tomodoro.conf
; Then: supervisorctl reread && supervisorctl update

[program:tomodoro-reverb]
process_name=%(program_name)s
command=php /var/www/tomodoro/artisan reverb:start --host=0.0.0.0 --port=8080
autostart=true
autorestart=true
user=www-data
redirect_stderr=true
stdout_logfile=/var/log/supervisor/tomodoro-reverb.log
stopwaitsecs=10

[program:tomodoro-queue]
process_name=%(program_name)s_%(process_num)02d
command=php /var/www/tomodoro/artisan queue:work --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/var/log/supervisor/tomodoro-queue.log
stopwaitsecs=10
